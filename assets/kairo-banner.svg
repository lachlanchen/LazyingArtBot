<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070d1c"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>

    <!-- Title gradient: amber → orange -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="75%" stop-color="#f97316"/>
    </linearGradient>

    <!-- Accent bar gradient: transparent → solid → transparent -->
    <linearGradient id="accentBarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#f59e0b" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- Dot grid tile -->
    <pattern id="dotGrid" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.85" fill="#ffffff" opacity="0.055"/>
    </pattern>

    <!-- Right-edge fade overlay -->
    <linearGradient id="rightFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#101827" stop-opacity="0"/>
      <stop offset="100%" stop-color="#101827" stop-opacity="1"/>
    </linearGradient>

    <!-- Left-edge content shadow -->
    <linearGradient id="leftGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.035"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>

    <!-- Title glow -->
    <filter id="titleGlow" x="-5%" y="-30%" width="115%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Hub-node glow -->
    <filter id="hubGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Peripheral node glow (lighter) -->
    <filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ── -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#dotGrid)"/>

  <!-- ── Left content warm wash ── -->
  <rect x="0" y="0" width="700" height="320" fill="url(#leftGlow)"/>

  <!-- ── Left accent bar ── -->
  <rect x="46" y="52" width="3.5" height="216" fill="url(#accentBarGrad)" rx="2"/>

  <!-- ── Halo behind title ── -->
  <ellipse cx="285" cy="158" rx="230" ry="58" fill="#f59e0b" opacity="0.035"/>

  <!-- ── Main title ── -->
  <text
    x="78" y="173"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="96"
    font-weight="900"
    fill="url(#titleGrad)"
    filter="url(#titleGlow)"
    letter-spacing="-2">Kairo</text>

  <!-- ── Divider line ── -->
  <line x1="78" y1="195" x2="510" y2="195" stroke="#f59e0b" stroke-width="0.6" opacity="0.45"/>
  <circle cx="72" cy="195" r="2.5" fill="#f59e0b" opacity="0.5"/>

  <!-- ── Chinese subtitle ── -->
  <text
    x="78" y="228"
    font-family="'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="300"
    fill="#cbd5e1"
    letter-spacing="5">个人全能 AI 秘书</text>

  <!-- ── English tagline ── -->
  <text
    x="78" y="262"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="13"
    fill="#64748b"
    letter-spacing="0.3">You think. Kairo remembers, organizes, and finds you at exactly the right moment.</text>

  <!-- ── Vertical separator ── -->
  <line x1="755" y1="28" x2="755" y2="292" stroke="#f59e0b" stroke-width="0.5" opacity="0.1"/>

  <!-- ══════════════════════════════════════════ -->
  <!--   RIGHT SIDE: AI network visualization    -->
  <!--   Hub:  (988, 160)                        -->
  <!--   N1:   (878, 85)   top-left              -->
  <!--   N2:   (975, 48)   top-center            -->
  <!--   N3:   (1088, 72)  top-right             -->
  <!--   N4:   (1148, 158) right                 -->
  <!--   N5:   (1080, 252) bottom-right          -->
  <!--   N6:   (868, 238)  bottom-left           -->
  <!--   N7:   (912, 148)  inner-left            -->
  <!--   N8:   (1038, 105) inner-top             -->
  <!-- ══════════════════════════════════════════ -->

  <!-- Outer ring connections (faint) -->
  <line x1="878" y1="85"  x2="975"  y2="48"  stroke="#f59e0b" stroke-width="0.7" opacity="0.13"/>
  <line x1="975" y1="48"  x2="1088" y2="72"  stroke="#f59e0b" stroke-width="0.7" opacity="0.13"/>
  <line x1="1088" y1="72" x2="1148" y2="158" stroke="#f59e0b" stroke-width="0.7" opacity="0.13"/>
  <line x1="1148" y1="158" x2="1080" y2="252" stroke="#f59e0b" stroke-width="0.7" opacity="0.13"/>
  <line x1="1080" y1="252" x2="868" y2="238" stroke="#f59e0b" stroke-width="0.7" opacity="0.13"/>
  <line x1="868"  y1="238" x2="878"  y2="85"  stroke="#f59e0b" stroke-width="0.7" opacity="0.08"/>

  <!-- Hub → peripheral spokes -->
  <line x1="988" y1="160" x2="878"  y2="85"  stroke="#f59e0b" stroke-width="1.3" opacity="0.32"/>
  <line x1="988" y1="160" x2="975"  y2="48"  stroke="#f59e0b" stroke-width="1.3" opacity="0.26"/>
  <line x1="988" y1="160" x2="1088" y2="72"  stroke="#f59e0b" stroke-width="1.3" opacity="0.30"/>
  <line x1="988" y1="160" x2="1148" y2="158" stroke="#f59e0b" stroke-width="1.3" opacity="0.28"/>
  <line x1="988" y1="160" x2="1080" y2="252" stroke="#f59e0b" stroke-width="1.3" opacity="0.28"/>
  <line x1="988" y1="160" x2="868"  y2="238" stroke="#f59e0b" stroke-width="1.3" opacity="0.32"/>
  <line x1="988" y1="160" x2="912"  y2="148" stroke="#f59e0b" stroke-width="0.8" opacity="0.20"/>
  <line x1="988" y1="160" x2="1038" y2="105" stroke="#f59e0b" stroke-width="0.8" opacity="0.20"/>

  <!-- Peripheral nodes -->
  <circle cx="878"  cy="85"  r="5.5" fill="#0a1020" stroke="#f59e0b" stroke-width="1.6" opacity="0.85" filter="url(#nodeGlow)"/>
  <circle cx="975"  cy="48"  r="4"   fill="#0a1020" stroke="#f59e0b" stroke-width="1.2" opacity="0.65"/>
  <circle cx="1088" cy="72"  r="5.5" fill="#0a1020" stroke="#f59e0b" stroke-width="1.6" opacity="0.85" filter="url(#nodeGlow)"/>
  <circle cx="1148" cy="158" r="4"   fill="#0a1020" stroke="#f59e0b" stroke-width="1.2" opacity="0.65"/>
  <circle cx="1080" cy="252" r="5.5" fill="#0a1020" stroke="#f59e0b" stroke-width="1.6" opacity="0.85" filter="url(#nodeGlow)"/>
  <circle cx="868"  cy="238" r="4"   fill="#0a1020" stroke="#f59e0b" stroke-width="1.2" opacity="0.65"/>
  <circle cx="912"  cy="148" r="3"   fill="#0a1020" stroke="#f59e0b" stroke-width="1"   opacity="0.50"/>
  <circle cx="1038" cy="105" r="3"   fill="#0a1020" stroke="#f59e0b" stroke-width="1"   opacity="0.50"/>

  <!-- Hub node — center -->
  <circle cx="988" cy="160" r="14" fill="#0a1020" stroke="#f59e0b" stroke-width="2.2" filter="url(#hubGlow)" opacity="0.95"/>
  <circle cx="988" cy="160" r="5.5" fill="#f59e0b" opacity="0.92"/>

  <!-- Right-edge fade to clip nodes gracefully -->
  <rect x="1100" y="0" width="100" height="320" fill="url(#rightFade)"/>
</svg>
